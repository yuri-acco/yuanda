<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>源达精密设备展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f8f9fa;
            padding: 2rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 页面标题 */
        .page-header {
            text-align: center;
            margin-bottom: 2.5rem;
            color: #222;
        }
        .page-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .page-header p {
            color: #666;
            font-size: 0.95rem;
        }

        /* 响应式卡片网格 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        /* 通用卡片样式 */
        .card {
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 12px rgba(0,0,0,0.07);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .card-media {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background-color: #f0f2f5;
        }

        .card-content {
            padding: 1rem;
            text-align: center;
        }
        .card-title {
            font-size: 1rem;
            color: #333;
            font-weight: 500;
        }

        /* 视频卡片样式 */
        .video-card .card-media {
            background: #ffffff;
        }
        .video-btn {
            background-color: #ff4d4f;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-bottom: 0.5rem;
        }
        .video-desc {
            font-size: 0.8rem;
            color: #666;
            line-height: 1.4;
        }

        /* 微信卡片样式 */
        .wechat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1rem;
            text-align: center;
        }
        .wechat-title {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 1rem;
        }
        .wechat-name {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* 页脚 */
        .page-footer {
            text-align: center;
            margin-top: 3rem;
            color: #666;
            font-size: 0.9rem;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .card-grid {
                grid-template-columns: 1fr;
            }
            .page-header h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <!-- 页面标题 -->
    <header class="page-header">
        <h1>源达精密设备产品展示</h1>
        <p>Precision Engineered | 极致秩序与精密美学</p>
    </header>

    <!-- 卡片网格区域 -->
    <div class="card-grid">
        <!-- 所有微信图片 -->
        <div class="card">
            <img src="微信图片_20260429221039_30_31.jpg" alt="设备展示" class="card-media">
        </div>
        <div class="card">
            <img src="微信图片_20260429221040_31_31.jpg" alt="设备展示" class="card-media">
        </div>
        <div class="card">

        </div>
        <div class="card">

        </div>
        <div class="card">
            <img src="微信图片_20260429221043_34_31.jpg" alt="设备展示" class="card-media">
        </div>
        <div class="card">

        <!-- 视频卡片（自动播放配置） -->

            <div class="card-content">

                <p class="video-desc">YBQ10便携式激光气体分析仪<br>产品介绍视频</p>

        </div>

        <!-- 扫码加好友卡片 -->

            <div class="card-content">
                <p class="card-title">扫码加我好友</p>

            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="page-footer">
        <p>Precision Engineered | 极致秩序与精密美学</p>

</body>
</html>
